<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กำลังประมวลผล - ระบบสอบออนไลน์</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="center-screen">
  <div class="processing-card">
    <div class="spinner-custom"></div>
    <h3 class="text-primary fw-bold mb-3">กำลังส่งกระดาษคำตอบ</h3>
    <p class="text-muted mb-4">กรุณารอสักครู่ ระบบกำลังตรวจสอบความถูกต้องของคำตอบและบันทึกผลสอบเข้าสู่ระบบส่วนกลาง...</p>
    
    <div class="progress" style="height: 12px; border-radius: 10px; background-color: #e2e8f0;">
      <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%; transition: width 30s linear;"></div>
    </div>
  </div>
</div>

<script>
  setTimeout(() => {
    document.getElementById('progress-bar').style.width = '100%';
  }, 100);

  setTimeout(() => {
    location.href = 'result.html';
  }, 30000);
</script>
</body>
</html>
