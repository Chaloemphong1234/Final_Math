<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ - ระบบสอบออนไลน์</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-split">
  <div class="login-left">
    <img src="im/1222.jpg" alt="Logo" class="img-fluid mb-4" style="max-height: 150px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; z-index: 1;">
    <h1 class="display-5 fw-bold mb-3" style="position: relative; z-index: 1;">ระบบสอบปลายภาคเรียน</h1>
    <p class="fs-4 opacity-75" style="position: relative; z-index: 1;">รายวิชาโปรแกรมสร้างภาพเคลื่อนไหว</p>
    <div style="position: absolute; bottom: 30px; font-size: 0.9rem; opacity: 0.6; z-index: 1;">MAESOD TECHNICAL COLLEGE</div>
  </div>

  <div class="login-right">
    <div class="input-display">
      <label class="text-muted small fw-bold mb-2 tracking-widest text-uppercase">กรุณากรอกรหัสนักศึกษา</label>
      <input type="text" id="sid" placeholder="-----------" readonly>
    </div>

    <div class="numpad">
      <button onclick="pressNum('1')">1</button>
      <button onclick="pressNum('2')">2</button>
      <button onclick="pressNum('3')">3</button>
      <button onclick="pressNum('4')">4</button>
      <button onclick="pressNum('5')">5</button>
      <button onclick="pressNum('6')">6</button>
      <button onclick="pressNum('7')">7</button>
      <button onclick="pressNum('8')">8</button>
      <button onclick="pressNum('9')">9</button>
      <button class="btn-danger" onclick="pressNum('clr')">C</button>
      <button onclick="pressNum('0')">0</button>
      <button class="btn-danger" onclick="pressNum('del')">←</button>
    </div>

    <div class="mt-4 w-100" style="max-width: 280px;">
      <button class="btn-submit" onclick="checkStudent()">เริ่มต้นการทดสอบ</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="exam.js"></script>
<script>
  function pressNum(val) {
    const input = document.getElementById('sid');
    if (val === 'del') {
      input.value = input.value.slice(0, -1);
    } else if (val === 'clr') {
      input.value = '';
    } else {
      if (input.value.length < 11) {
        input.value += val;
      }
    }
  }
</script>
</body>
</html>
